<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <!-- Widened the white stop points so the middle stays 100% bright -->
    <linearGradient id="fadeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="5%" stop-color="transparent" />
      <stop offset="15%" stop-color="white" />
      <stop offset="85%" stop-color="white" />
      <stop offset="95%" stop-color="transparent" />
    </linearGradient>
    <mask id="fadeMask">
      <rect width="800" height="400" fill="url(#fadeGrad)" />
    </mask>

    <style>
      /* Base styles */
      rect.bg { fill: #121212; }
      
      .lyric-text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-size: 26px;
        font-weight: 700;
        text-anchor: middle;
        fill: rgba(255, 255, 255, 0.3); /* Inactive dim text */
      }

      /* Container scrolling animation (Total 15s loop) */
      .scroller {
        animation: scrollUp 15s infinite;
      }

      /* Removed the opacity fade-out at 100% for consistent brightness */
      @keyframes scrollUp {
        0%, 15%   { transform: translateY(0px); }
        20%, 35%  { transform: translateY(-50px); }
        40%, 55%  { transform: translateY(-100px); }
        60%, 75%  { transform: translateY(-150px); }
        80%, 95%  { transform: translateY(-200px); }
        100%      { transform: translateY(-250px); } 
      }

      /* Snappier transitions to keep the active line perfectly white */
      .l1 { animation: glow1 15s infinite; }
      .l2 { animation: glow2 15s infinite; }
      .l3 { animation: glow3 15s infinite; }
      .l4 { animation: glow4 15s infinite; }
      .l5 { animation: glow5 15s infinite; }

      @keyframes glow1 {
        0%, 15%   { fill: #ffffff; font-size: 28px; }
        20%, 100% { fill: rgba(255, 255, 255, 0.3); font-size: 26px; }
      }
      @keyframes glow2 {
        0%, 15%   { fill: rgba(255, 255, 255, 0.3); font-size: 26px; }
        20%, 35%  { fill: #ffffff; font-size: 28px; }
        40%, 100% { fill: rgba(255, 255, 255, 0.3); font-size: 26px; }
      }
      @keyframes glow3 {
        0%, 35%   { fill: rgba(255, 255, 255, 0.3); font-size: 26px; }
        40%, 55%  { fill: #ffffff; font-size: 28px; }
        60%, 100% { fill: rgba(255, 255, 255, 0.3); font-size: 26px; }
      }
      @keyframes glow4 {
        0%, 55%   { fill: rgba(255, 255, 255, 0.3); font-size: 26px; }
        60%, 75%  { fill: #ffffff; font-size: 28px; }
        80%, 100% { fill: rgba(255, 255, 255, 0.3); font-size: 26px; }
      }
      @keyframes glow5 {
        0%, 75%   { fill: rgba(255, 255, 255, 0.3); font-size: 26px; }
        80%, 95%  { fill: #ffffff; font-size: 28px; }
        100%      { fill: rgba(255, 255, 255, 0.3); font-size: 26px; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="100%" height="100%" rx="15" />

  <!-- Animated Lyrics wrapped in the adjusted mask -->
  <g mask="url(#fadeMask)">
    <g class="scroller">
      <text x="50%" y="200" class="lyric-text l1">I got my peaches out in Georgia (oh yeah, shit)</text>
      <text x="50%" y="250" class="lyric-text l2">I get my weed from California (that's that shit)</text>
      <text x="50%" y="300" class="lyric-text l3">I took my chick up to the North, yeah (badass bitch)</text>
      <text x="50%" y="350" class="lyric-text l4">I get my light right from the source, yeah (yeah, that's it)</text>
      <text x="50%" y="400" class="lyric-text l5">And I see you (oh), the way I breathe you in...</text>
    </g>
  </g>
</svg>
